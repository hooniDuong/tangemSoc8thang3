<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <!-- Male -->
    <path fill="#ececec" d="M70,80 C80,80 90,90 90,100 C90,110 80,120 70,120 C60,120 50,110 50,100 C50,90 60,80 70,80 Z"/>
    <path fill="#ececec" d="M30,190 C30,150 50,130 70,130 C80,130 90,135 100,145 L110,140 L115,150 L100,160 L100,190 Z"/>
    <!-- Female -->
    <path fill="#ffffff" d="M140,90 C150,90 160,100 160,110 C160,120 150,130 140,130 C130,130 120,120 120,110 C120,100 130,90 140,90 Z"/>
    <path fill="#ffffff" d="M120,140 C130,135 150,135 160,140 L170,190 L110,190 Z"/>
    <!-- Bouquet -->
    <g transform="translate(105, 130)">
        <!-- Wrapping Paper Back -->
        <path d="M-15,-10 L-25,-25 C-10,-30 10,-30 25,-25 L15,-10 Z" fill="#ffeebb" opacity="0.9"/>
        
        <!-- Dense Cluster of Roses & Flowers -->
        <!-- Row 3 (Back) -->
        <circle cx="-12" cy="-18" r="6" fill="#ff4f87"/>
        <circle cx="0" cy="-22" r="7" fill="#ffb6c1"/>
        <circle cx="12" cy="-18" r="6" fill="#ff87ab"/>
        <path d="M0,-22 A2.5,2.5 0 0,1 -2,-19 A2.5,2.5 0 0,1 -3,-21" fill="none" stroke="#fff" stroke-width="0.6" opacity="0.6"/>
        
        <!-- Row 2 -->
        <circle cx="-16" cy="-10" r="6" fill="#ffb6c1"/>
        <circle cx="-8" cy="-14" r="7" fill="#d6336c"/>
        <circle cx="8" cy="-14" r="7" fill="#ff4f87"/>
        <circle cx="16" cy="-10" r="6" fill="#ffb6c1"/>
        <path d="M-8,-14 A2.5,2.5 0 0,1 -10,-11 A2.5,2.5 0 0,1 -11,-13" fill="none" stroke="#fff" stroke-width="0.6" opacity="0.6"/>
        <path d="M8,-14 A2.5,2.5 0 0,1 6,-11 A2.5,2.5 0 0,1 5,-13" fill="none" stroke="#fff" stroke-width="0.6" opacity="0.6"/>
        
        <!-- Row 1 (Front) -->
        <circle cx="-10" cy="-4" r="7" fill="#ff87ab"/>
        <circle cx="0" cy="-6" r="8" fill="#ffb6c1"/>
        <circle cx="10" cy="-4" r="7" fill="#d6336c"/>
        <path d="M0,-6 A3,3 0 0,1 -2,-3 A3,3 0 0,1 -4,-5" fill="none" stroke="#fff" stroke-width="0.7" opacity="0.6"/>
        <path d="M-10,-4 A2.5,2.5 0 0,1 -12,-1 A2.5,2.5 0 0,1 -13,-3" fill="none" stroke="#fff" stroke-width="0.6" opacity="0.6"/>
        <path d="M10,-4 A2.5,2.5 0 0,1 8,-1 A2.5,2.5 0 0,1 7,-3" fill="none" stroke="#fff" stroke-width="0.6" opacity="0.6"/>
        
        <!-- Small filler flowers and leaves -->
        <circle cx="-18" cy="-15" r="2" fill="#fff"/>
        <circle cx="18" cy="-15" r="2.5" fill="#fff"/>
        <circle cx="0" cy="-15" r="2" fill="#fff"/>
        <path d="M-10,-20 Q-15,-25 -12,-28 Q-8,-25 -10,-20" fill="#2d6a4f" />
        <path d="M10,-20 Q15,-25 12,-28 Q8,-25 10,-20" fill="#2d6a4f" />
        <path d="M-18,-8 Q-25,-10 -25,-5 Q-20,-2 -18,-8" fill="#1b4332" />
        <path d="M18,-8 Q25,-10 25,-5 Q20,-2 18,-8" fill="#1b4332" />
        
        <!-- Wrapping Paper Front & Cone -->
        <path d="M-15,-2 L0,20 L15,-2 C8,2 -8,2 -15,-2 Z" fill="#fffdf5" stroke="#eccdb6" stroke-width="0.5"/>
        <path d="M-15,-2 Q0,4 15,-2" fill="none" stroke="#d4a373" stroke-width="1"/>
        
        <!-- Ribbon/Bow -->
        <path d="M0,8 C-10,5 -15,15 0,10 C15,15 10,5 0,8 Z" fill="#ff4f87"/>
        <path d="M-2,9 C-10,20 -5,25 -2,25 C0,25 0,15 -2,9 Z" fill="#ff87ab"/>
        <path d="M2,9 C10,20 5,25 2,25 C0,25 0,15 2,9 Z" fill="#ffb6c1"/>
    </g>
</svg>
