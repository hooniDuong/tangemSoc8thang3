<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soc iu oiiii 🌸</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Canvas for Lock Screen Effects (Fireworks) & Surprise Finale -->
    <canvas id="canvas-overlay"></canvas>

    <!-- PHASE 1: LOCK SCREEN -->
    <section id="lock-screen" class="active">
        <div class="glass-card">
            <div class="avatar-container">
                <div class="floating-hearts">
                    <span class="heart h1">❤️</span>
                    <span class="heart h2">💖</span>
                    <span class="heart h3">💕</span>
                    <span class="heart h4">💗</span>
                </div>
                <img src="PictureOfSoc/sociu5.jpg" alt="Avatar" class="avatar">
            </div>
            <h2>Hello, Soc iuuu</h2>
            <div class="pin-display">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="keypad">
                <button class="key">1</button>
                <button class="key">2</button>
                <button class="key">3</button>
                <button class="key">4</button>
                <button class="key">5</button>
                <button class="key">6</button>
                <button class="key">7</button>
                <button class="key">8</button>
                <button class="key">9</button>
                <button class="key function" id="clear-btn">C</button>
                <button class="key">0</button>
                <button class="key function" id="del-btn">&larr;</button>
            </div>
            <div class="hint-container">
                <svg id="heart-hint" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#ff4f87" width="32px"
                    height="32px">
                    <path
                        d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                </svg>
                <div class="hint-popup" id="hint-popup">A special date is your birthday!!</div>
            </div>
        </div>
    </section>

    <!-- PHASE 2: MAIN DASHBOARD -->
    <section id="main-dashboard" class="hidden">
        <h1 class="dashboard-title">Happy Woman's Day</h1>
        <div class="card-grid">
            <div class="nav-card" id="card-music">
                <svg viewBox="0 0 24 24" fill="none" stroke="url(#pink-grad)" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" style="filter: drop-shadow(0 0 5px rgba(255, 79, 135, 0.4));">
                    <defs>
                        <linearGradient id="pink-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#ff4f87" />
                            <stop offset="100%" stop-color="#ffb6c1" />
                        </linearGradient>
                    </defs>
                    <path d="M9 18V5l12-2v13"></path>
                    <circle cx="6" cy="18" r="3"></circle>
                    <circle cx="18" cy="16" r="3"></circle>
                </svg>
                <h3>Music</h3>
            </div>
            <div class="nav-card" id="card-letter">
                <svg viewBox="0 0 24 24" fill="none" stroke="url(#pink-grad)" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" style="filter: drop-shadow(0 0 5px rgba(255, 79, 135, 0.4));">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <h3>Letter</h3>
            </div>
            <div class="nav-card" id="card-memories">
                <svg viewBox="0 0 24 24" fill="none" stroke="url(#pink-grad)" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" style="filter: drop-shadow(0 0 5px rgba(255, 79, 135, 0.4));">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
                <h3>Memories</h3>
            </div>
            <div class="nav-card" id="card-surprise">
                <svg viewBox="0 0 24 24" fill="none" stroke="url(#pink-grad)" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" style="filter: drop-shadow(0 0 5px rgba(255, 79, 135, 0.4));">
                    <polyline points="20 12 20 22 4 22 4 12"></polyline>
                    <rect x="2" y="7" width="20" height="5"></rect>
                    <line x1="12" y1="22" x2="12" y2="7"></line>
                    <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path>
                    <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path>
                </svg>
                <h3>Surprise</h3>
            </div>
        </div>
    </section>

    <!-- CONTENT SECTIONS -->
    <!-- 1. Music Player -->
    <section id="section-music" class="content-section hidden">
        <div class="music-layout-container">
            <!-- Left: Player -->
            <div class="glass-card music-card">
                <div class="vinyl-container">
                    <img src="" alt="Album Art" class="vinyl" id="vinyl-disc">
                </div>
                <div class="song-info">
                    <h3>...</h3>
                    <p>...</p>
                </div>
                <div class="progress-container" id="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="controls">
                    <button id="prev-btn" class="control-btn"><svg viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="19 20 9 12 19 4 19 20"></polygon>
                            <line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"></line>
                        </svg></button>
                    <button id="play-btn" class="control-btn play-btn"><svg viewBox="0 0 24 24" fill="currentColor"
                            id="play-icon">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg></button>
                    <button id="next-btn" class="control-btn"><svg viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 4 15 12 5 20 5 4"></polygon>
                            <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"></line>
                        </svg></button>
                </div>
                <audio id="audio-element" src=""></audio>
            </div>

            <!-- Right: Playlist -->
            <div class="glass-card playlist-card">
                <h2>Playlist</h2>
                <ul class="playlist-list" id="playlist-list">
                    <!-- Javascript will inject li items here -->
                </ul>
            </div>
        </div>
    </section>

    <!-- 2. Interactive Letter -->
    <section id="section-letter" class="content-section hidden">
        <div class="envelope-container" id="envelope-container">
            <div class="envelope">
                <div class="flap"></div>
                <div class="body"></div>
                <div class="letter">
                    <p id="typewriter-text"></p>
                </div>
            </div>
        </div>
    </section>

    <!-- 3. Memories (Infinite Motion Gallery) -->
    <section id="section-memories" class="content-section hidden">
        <div class="gallery-container">
            <!-- Top Row (Left Scroll) -->
            <div class="gallery-row scroll-left">
                <div class="gallery-track" id="track-top">
                    <!-- Images will be injected by JS -->
                </div>
            </div>
            <!-- Bottom Row (Right Scroll) -->
            <div class="gallery-row scroll-right">
                <div class="gallery-track" id="track-bottom">
                    <!-- Images will be injected by JS -->
                </div>
            </div>
        </div>

        <!-- Lightbox Modal -->
        <div class="lightbox" id="lightbox">
            <span class="lightbox-close" id="lightbox-close">&times;</span>
            <img class="lightbox-img" id="lightbox-img" src="" alt="Zoomed Memory">
        </div>
    </section>

    <!-- 4. Surprise Finale -->
    <section id="section-surprise" class="content-section hidden">
        <div class="finale-container">
            <!-- Canvas is behind this for celestial rain and blooming flowers -->
            <div class="meadow-overlay" id="meadow-overlay"></div>
            <div class="silhouette-container" id="silhouette-container">
                <img src="assets/couple-silhouette.svg" alt="Couple Silhouette" class="silhouette">
            </div>
            <div class="closing-message" id="closing-message">
                Chúc em 8/3 thật hạnh phúc ❤️
            </div>

            <!-- Voice Message Button -->
            <p style="color: white; font-family: var(--font-primary); font-size: 1.2rem; margin-bottom: 10px; z-index: 15; opacity: 0; transition: opacity 2s 4s;"
                class="voice-message-btn-txt">Lời anh muốn nói</p>
            <button id="voice-message-btn" class="voice-message-btn">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                <span>Play</span>
            </button>
            <audio id="voice-audio-element" src="8-3soc.m4a"></audio>
        </div>
    </section>

    <!-- Persistent Back Button -->
    <button id="back-btn" class="back-btn hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back
    </button>

    <script src="canvas-effects.js"></script>
    <script src="app.js"></script>
</body>

</html>
